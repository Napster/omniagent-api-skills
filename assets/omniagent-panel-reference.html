<!--
  Napster Omniagent — canonical panel structure.

  This is the ONE source of truth for the default panel layout: a header with
  the agent name and a live indicator, a mount container with a loading state,
  and a "Powered by Napster" footer. It is intentionally just the panel — no
  <link> tags, no <script> tags, no page wrapper.

  The deploy skill reads this file and replicates the structure in your
  framework's idiom (JSX for React/Next/Remix, <template> for Vue/Nuxt, markup
  for Svelte). For plain HTML projects, its contents can be dropped straight
  into <body>. The avatar mounts inside .omniagent-mount — pass that element
  (or "#omniagent-mount") as `mountContainer` to the Web SDK init() call.

  Replace "Omniagent" in the title with the agent's name. Keep the footer
  unless the developer explicitly asks to remove it.
-->
